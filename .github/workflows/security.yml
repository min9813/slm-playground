name: security

# Server-side security scan — the layer that CANNOT be bypassed with
# `git commit --no-verify` or a missing local pre-commit install.
#   - gitleaks : full-history secret scan
#   - trivy    : dependency CVEs (uv.lock) + IaC/Dockerfile misconfiguration
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (full-history secret scan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full git history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 0 = all commits, so leaks buried in old history are caught too

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: '8.30.1'   # keep in sync with .pre-commit-config.yaml
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan full history for secrets
        run: gitleaks git --redact --verbose --exit-code 1 .

  trivy:
    name: trivy (dependency CVEs + misconfig)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Complements gitleaks: vulnerabilities in deps (reads uv.lock) + IaC/Dockerfile
      # misconfigurations. Secret scanning is intentionally left to the gitleaks job
      # above to avoid double-reporting.
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig
          severity: CRITICAL,HIGH
          ignore-unfixed: true   # only fail on CVEs that actually have a fix available
          exit-code: '1'         # set to '0' to report-only (don't block PRs)
          format: table
